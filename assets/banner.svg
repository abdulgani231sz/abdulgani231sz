<svg width="100%" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="45%" stop-color="#12101f"/>
      <stop offset="100%" stop-color="#0d1626"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="auroraCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="260" fill="url(#bgGrad)"/>

  <circle cx="740" cy="60" r="150" fill="url(#auroraCyan)">
    <animate attributeName="cx" values="740;700;740" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="r" values="140;170;140" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="620" cy="150" r="120" fill="url(#auroraViolet)">
    <animate attributeName="cx" values="620;670;620" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="200" r="100" fill="url(#auroraPink)">
    <animate attributeName="r" values="90;110;90" dur="8s" repeatCount="indefinite"/>
  </circle>

  <g stroke="#7dd3fc" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="30" x2="900" y2="30"/>
    <line x1="0" y1="70" x2="900" y2="70"/>
    <line x1="0" y1="110" x2="900" y2="110"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="190" x2="900" y2="190"/>
    <line x1="0" y1="230" x2="900" y2="230"/>
    <line x1="150" y1="0" x2="150" y2="260"/>
    <line x1="300" y1="0" x2="300" y2="260"/>
    <line x1="450" y1="0" x2="450" y2="260"/>
    <line x1="600" y1="0" x2="600" y2="260"/>
    <line x1="750" y1="0" x2="750" y2="260"/>
  </g>

  <line x1="0" y1="0" x2="900" y2="0" stroke="#7dd3fc" stroke-opacity="0.5" stroke-width="1.5">
    <animate attributeName="y1" values="0;260;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;260;0" dur="6s" repeatCount="indefinite"/>
  </line>

  <g font-family="Fira Code, Consolas, monospace" font-size="13">
    <rect x="58" y="46" width="150" height="24" rx="4" fill="#7dd3fc" fill-opacity="0.1" stroke="#7dd3fc" stroke-opacity="0.4"/>
    <circle cx="70" cy="58" r="3" fill="#7dd3fc">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="80" y="62" fill="#7dd3fc">~/abdul-gani</text>
  </g>

  <g font-family="Segoe UI, Verdana, sans-serif">
    <text x="60" y="140" font-size="58" font-weight="800" fill="url(#textGrad)">Abdul Gani</text>
    <text x="63" y="176" font-size="20" fill="#c4b5fd" letter-spacing="2">FULLSTACK AI AUTOMATION DEVELOPER</text>
  </g>

  <g transform="translate(60,212)">
    <circle r="4" fill="#7dd3fc">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="14" y="5" font-size="13" fill="#7dd3fc" font-family="Segoe UI, Verdana, sans-serif">Davangere, Karnataka, India</text>
  </g>
</svg>



