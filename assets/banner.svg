<svg width="100%" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="55%" stop-color="#0f1b2d"/>
      <stop offset="100%" stop-color="#132539"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="260" fill="url(#bgGrad)"/>

  <circle cx="760" cy="70" r="140" fill="url(#glow)">
    <animate attributeName="r" values="120;150;120" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="90" cy="210" r="110" fill="url(#glow)">
    <animate attributeName="r" values="90;120;90" dur="7s" repeatCount="indefinite"/>
  </circle>

  <g stroke="#7dd3fc" stroke-opacity="0.12" stroke-width="1">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
  </g>

  <path d="M0,230 C150,200 300,250 450,220 C600,190 750,230 900,205 L900,260 L0,260 Z" fill="#7dd3fc" fill-opacity="0.06">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="M0,230 C150,200 300,250 450,220 C600,190 750,230 900,205 L900,260 L0,260 Z;
              M0,215 C150,240 300,195 450,225 C600,255 750,205 900,225 L900,260 L0,260 Z;
              M0,230 C150,200 300,250 450,220 C600,190 750,230 900,205 L900,260 L0,260 Z"/>
  </path>

  <g font-family="Segoe UI, Verdana, sans-serif">
    <text x="60" y="115" font-size="56" font-weight="700" fill="url(#textGrad)">Abdul Gani</text>
    <text x="62" y="150" font-size="20" fill="#93c5fd" letter-spacing="1">FULLSTACK AI AUTOMATION DEVELOPER</text>
    <text x="62" y="185" font-size="15" fill="#64748b">Computer Vision &#8226; Real-Time Inference &#8226; End-to-End AI Systems</text>
  </g>

  <g transform="translate(60,205)">
    <circle r="4" fill="#7dd3fc">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="14" y="5" font-size="13" fill="#7dd3fc" font-family="Segoe UI, Verdana, sans-serif">Davangere, Karnataka, India</text>
  </g>
</svg>
